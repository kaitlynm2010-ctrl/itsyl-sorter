function imgUrl(slug) {
  const id = IMG_SLUGS[slug];
  if (!id) return null;
  if (id.length > 36) {
    return `https://cdn.sanity.io/images/7lpknm4h/production/${id}-2650x1500.jpg?w=500`;
  }
  return `https://cdn.sanity.io/images/7lpknm4h/production/${id}-2650x1500.jpg?w=500`;
}

let state = {
  phase: 'start',
  selectedSeasons: [1,2,3],
  skits: [],
  scores: {},
  comparisons: [],
  currentIdx: 0,
  history: [],
};

function initSkits() {
  state.skits = ALL_SKITS.filter(s => state.selectedSeasons.includes(s.s));
  state.scores = {};
  state.skits.forEach(s => { state.scores[s.slug] = 1200; });
  state.comparisons = [];
  state.history = [];
  for (let i = 0; i < state.skits.length; i++) {
    for (let j = i+1; j < state.skits.length; j++) {
      state.comparisons.push([i, j]);
    }
  }
  shuffle(state.comparisons);
  state.comparisons = state.comparisons.slice(0, Math.min(state.comparisons.length, state.skits.length * 5));
  state.currentIdx = 0;
  state.phase = 'battle';
}

function shuffle(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function eloUpdate(winnerSlug, loserSlug) {
  const K = 32;
  const rW = state.scores[winnerSlug];
  const rL = state.scores[loserSlug];
  const eW = 1 / (1 + Math.pow(10, (rL - rW) / 400));
  const eL = 1 - eW;
  state.scores[winnerSlug] = Math.round(rW + K * (1 - eW));
  state.scores[loserSlug] = Math.round(rL + K * (0 - eL));
}

function pick(winnerIdx) {
  const [i, j] = state.comparisons[state.currentIdx];
  const winner = state.skits[winnerIdx === 0 ? i : j];
  const loser = state.skits[winnerIdx === 0 ? j : i];
  state.history.push({idx: state.currentIdx, pairs: [i,j], winnerSlug: winner.slug});
  eloUpdate(winner.slug, loser.slug);
  state.currentIdx++;
  if (state.currentIdx >= state.comparisons.length) {
    state.phase = 'results';
  }
  render();
}

function undoPick() {
  if (!state.history.length) return;
  const last = state.history.pop();
  const [i, j] = last.pairs;
  const winner = state.skits[last.winnerSlug === state.skits[i].slug ? i : j];
  const loser = state.skits[last.winnerSlug === state.skits[i].slug ? j : i];
  const K = 32;
  const rW = state.scores[winner.slug];
  const rL = state.scores[loser.slug];
  const eW = 1 / (1 + Math.pow(10, (rL - rW) / 400));
  state.scores[winner.slug] = Math.round(rW - K * (1 - eW));
  state.scores[loser.slug] = Math.round(rL + K * (1 - eW));
  state.currentIdx = last.idx;
  state.phase = 'battle';
  render();
}

function skipPick() {
  state.currentIdx++;
  if (state.currentIdx >= state.comparisons.length) {
    state.phase = 'results';
  }
  render();
}

function cardHtml(skit, side) {
  const url = imgUrl(skit.slug);
  const imgPart = url
    ? `<img class="skit-img" src="${url}" alt="${skit.name}" onerror="this.style.display='none';this.nextSibling.style.display='flex'">`
      + `<div class="skit-img-placeholder" style="display:none">🎬</div>`
    : `<div class="skit-img-placeholder">🎬</div>`;
  return `<div class="skit-card" onclick="pick(${side})">
    ${imgPart}
    <div class="skit-info">
      <div class="skit-name">${skit.name}</div>
      <div class="skit-meta">Season ${skit.s} · Episode ${skit.e}</div>
    </div>
  </div>`;
}

function render() {
  const main = document.getElementById('main');
  if (state.phase === 'start') {
    main.innerHTML = `<div class="start-screen">
      <p>Pick your favorite skit in each head-to-head battle.<br>We'll use those choices to build your personal ranking.</p>
      <div class="season-filter">
        <button class="filter-btn ${state.selectedSeasons.includes(1)?'active':''}" onclick="toggleSeason(1)">Season 1</button>
        <button class="filter-btn ${state.selectedSeasons.includes(2)?'active':''}" onclick="toggleSeason(2)">Season 2</button>
        <button class="filter-btn ${state.selectedSeasons.includes(3)?'active':''}" onclick="toggleSeason(3)">Season 3</button>
      </div>
      <p style="font-size:13px;color:var(--color-text-tertiary)">${ALL_SKITS.filter(s=>state.selectedSeasons.includes(s.s)).length} skits selected</p>
      <button class="start-btn" onclick="startSort()" style="margin-top:16px">start sorting</button>
    </div>`;
  } else if (state.phase === 'battle') {
    const [i, j] = state.comparisons[state.currentIdx];
    const skitA = state.skits[i];
    const skitB = state.skits[j];
    const pct = Math.round((state.currentIdx / state.comparisons.length) * 100);
    main.innerHTML = `
      <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      <div class="progress-label">battle ${state.currentIdx+1} of ${state.comparisons.length} · ${pct}% sorted</div>
      <p style="text-align:center;font-size:14px;color:var(--color-text-secondary);margin:12px 0 4px">which skit do you like better?</p>
      <div class="battle-area">
        ${cardHtml(skitA, 0)}
        <div class="vs-divider">vs</div>
        ${cardHtml(skitB, 1)}
      </div>
      <div class="btn-row">
        <button class="btn" onclick="skipPick()">skip / no opinion</button>
        ${state.history.length ? `<button class="btn" onclick="undoPick()">← undo</button>` : ''}
        <button class="btn" onclick="finishEarly()">see results now</button>
      </div>`;
  } else {
    const ranked = [...state.skits].sort((a,b) => state.scores[b.slug] - state.scores[a.slug]);
    const items = ranked.map((s, idx) => {
      let cls = 'rank-item';
      let numContent = `${idx+1}`;
      if (idx === 0) { cls += ' medal-1'; numContent = ''; }
      else if (idx === 1) { cls += ' medal-2'; numContent = ''; }
      else if (idx === 2) { cls += ' medal-3'; numContent = ''; }
      return `<li class="${cls}">
        <span class="rank-num">${numContent}</span>
        <span class="rank-name">${s.name}</span>
        <span class="rank-meta">S${s.s}E${s.e}</span>
        <span class="rank-score">${state.scores[s.slug]}</span>
      </li>`;
    }).join('');
    main.innerHTML = `<div class="results-area">
      <h2>your personal ranking</h2>
      <p>${ranked.length} skits sorted · scores shown on the right</p>
      <ul class="rank-list">${items}</ul>
      <button class="restart-btn" onclick="restart()">sort again</button>
    </div>`;
  }
}

function toggleSeason(s) {
  if (state.selectedSeasons.includes(s)) {
    if (state.selectedSeasons.length > 1) state.selectedSeasons = state.selectedSeasons.filter(x=>x!==s);
  } else {
    state.selectedSeasons.push(s);
  }
  render();
}

function startSort() { initSkits(); render(); }
function finishEarly() { state.phase = 'results'; render(); }
function restart() { state.phase = 'start'; render(); }

render();
</script>
