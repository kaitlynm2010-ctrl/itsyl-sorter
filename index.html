    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple: #7F77DD;
      --purple-dark: #6860c4;
      --bg: #ffffff;
      --bg-secondary: #f5f5f5;
      --text-primary: #111111;
      --text-secondary: #555555;
      --text-tertiary: #999999;
      --border: rgba(0,0,0,0.12);
      --border-light: rgba(0,0,0,0.07);
      --radius: 12px;
      --radius-sm: 8px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a1a;
        --bg-secondary: #242424;
        --text-primary: #f0f0f0;
        --text-secondary: #aaaaaa;
        --text-tertiary: #666666;
        --border: rgba(255,255,255,0.12);
        --border-light: rgba(255,255,255,0.07);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #app {
      max-width: 680px;
      width: 100%;
      margin: 0 auto;
      padding: 2rem 1rem 1rem;
      flex: 1;
    }

    /* HEADER */
    .header { text-align: center; margin-bottom: 2rem; }
    .header h1 { font-size: 24px; font-weight: 600; letter-spacing: -0.3px; }
    .header p { font-size: 15px; color: var(--text-secondary); margin-top: 6px; }

    /* SEASON FILTER */
    .season-filter { display: flex; gap: 8px; justify-content: center; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .filter-btn {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      border-radius: 99px;
      padding: 5px 16px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .filter-btn.active { background: var(--purple); color: #fff; border-color: var(--purple); }
    .filter-btn:hover:not(.active) { border-color: var(--purple); color: var(--purple); }

    /* START SCREEN */
    .start-screen { text-align: center; padding: 1rem 0; }
    .start-screen .intro { font-size: 15px; color: var(--text-secondary); margin: 8px 0 24px; line-height: 1.6; }
    .start-btn {
      background: var(--purple); color: #fff; border: none;
      border-radius: var(--radius-sm); padding: 12px 32px;
      font-size: 16px; cursor: pointer; font-family: inherit; font-weight: 600;
      transition: background 0.15s;
    }
    .start-btn:hover { background: var(--purple-dark); }
    .skit-count { font-size: 13px; color: var(--text-tertiary); margin-top: 8px; }

    /* PROGRESS */
    .progress-wrap { margin-bottom: 1rem; }
    .progress-bar-track { background: var(--bg-secondary); border-radius: 99px; height: 6px; overflow: hidden; margin-bottom: 6px; }
    .progress-bar-fill { height: 100%; background: var(--purple); border-radius: 99px; transition: width 0.3s ease; }
    .progress-label { font-size: 12px; color: var(--text-tertiary); text-align: center; }

    /* BATTLE */
    .battle-question { text-align: center; font-size: 15px; color: var(--text-secondary); margin: 12px 0 8px; }
    .battle-area { display: flex; gap: 12px; align-items: stretch; justify-content: center; margin-bottom: 12px; }
    .skit-card {
      flex: 1; max-width: 290px; min-width: 160px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden; cursor: pointer;
      transition: border-color 0.15s, transform 0.1s, box-shadow 0.15s;
      display: flex; flex-direction: column;
    }
    .skit-card:hover { border-color: var(--purple); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(127,119,221,0.2); }
    .skit-card:active { transform: scale(0.98); }
    .skit-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: var(--bg-secondary); display: block; }
    .skit-img-placeholder { width: 100%; aspect-ratio: 16/9; background: var(--bg-secondary); display: flex; align-items: center; justify-content: center; font-size: 32px; }
    .skit-info { padding: 10px 12px 14px; flex: 1; }
    .skit-name { font-size: 14px; font-weight: 600; line-height: 1.35; }
    .skit-meta { font-size: 12px; color: var(--text-tertiary); margin-top: 3px; }
    .vs-badge {
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600; color: var(--text-tertiary);
      padding: 0 4px; align-self: center; flex-shrink: 0;
    }

    /* BATTLE BUTTONS */
    .btn-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
    .btn {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      border-radius: var(--radius-sm);
      padding: 7px 16px; font-size: 13px;
      cursor: pointer; font-family: inherit;
      transition: background 0.1s, border-color 0.1s;
    }
    .btn:hover { background: var(--bg-secondary); border-color: var(--border); }

    /* RESULTS */
    .results-header { text-align: center; margin-bottom: 1.25rem; }
    .results-header h2 { font-size: 20px; font-weight: 600; }
    .results-header p { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

    .rank-list { list-style: none; border: 1px solid var(--border-light); border-radius: var(--radius); overflow: hidden; }
    .rank-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border-light);
    }
    .rank-item:last-child { border-bottom: none; }
    .rank-item:nth-child(odd) { background: var(--bg-secondary); }
    .rank-num { font-size: 13px; font-weight: 500; color: var(--text-tertiary); min-width: 28px; text-align: right; flex-shrink: 0; }
    .rank-medal { font-size: 18px; min-width: 28px; text-align: right; flex-shrink: 0; }
    .rank-name { font-size: 14px; font-weight: 500; flex: 1; }
    .rank-meta { font-size: 11px; color: var(--text-tertiary); flex-shrink: 0; }
    .rank-score { font-size: 12px; color: var(--purple); font-weight: 500; min-width: 46px; text-align: right; flex-shrink: 0; }

    /* SHARE */
    .share-row { text-align: center; margin-top: 1.5rem; }
    .share-btn {
      background: var(--purple); color: #fff; border: none;
      border-radius: var(--radius-sm); padding: 10px 22px;
      font-size: 14px; cursor: pointer; font-family: inherit; font-weight: 600;
      transition: background 0.15s;
    }
    .share-btn:hover { background: var(--purple-dark); }
    .copied-msg { font-size: 12px; color: var(--purple); margin-top: 8px; min-height: 18px; }

    .restart-btn {
      display: block; margin: 1.25rem auto 0;
      padding: 8px 24px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text-primary); border-radius: var(--radius-sm);
      font-size: 14px; cursor: pointer; font-family: inherit;
      transition: background 0.1s;
    }
    .restart-btn:hover { background: var(--bg-secondary); }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 1.5rem 1rem;
      font-size: 11px;
      color: var(--text-tertiary);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-top: 1px solid var(--border-light);
      margin-top: 2rem;
    }

    @media (max-width: 480px) {
      .header h1 { font-size: 20px; }
      .skit-card { min-width: 130px; }
      .skit-name { font-size: 13px; }
    }
  </style>

  {name:"The Driving Crooner",s:3,e:1,slug:"the-driving-crooner"},
  {name:"Supermarket Swap: VR Edition",s:3,e:2,slug:"supermarket-swap-vr-edition"},
  {name:"Darmine Doggy Door",s:3,e:2,slug:"darmine-doggy-door"},
  {name:"Parked on the Sidewalk",s:3,e:2,slug:"parked-on-the-sidewalk"},
  {name:"Feed Eggs",s:3,e:2,slug:"feed-eggs"},
  {name:"Studio Audience",s:3,e:2,slug:"studio-audience"},
  {name:"Silent Theater",s:3,e:3,slug:"silent-theater"},
  {name:"Dog Hair",s:3,e:3,slug:"dog-hair"},
  {name:"ABX Heart Monitor",s:3,e:3,slug:"abx-heart-monitor"},
  {name:"Pay It Forward",s:3,e:3,slug:"pay-it-forward"},
  {name:"Rat Mom",s:3,e:3,slug:"rat-mom"},
  {name:"Friend Group",s:3,e:4,slug:"friend-group"},
  {name:"Pacific Proposal Park",s:3,e:4,slug:"pacific-proposal-park"},
  {name:"Gelutol",s:3,e:4,slug:"gelutol"},
  {name:"Shirt Brothers",s:3,e:4,slug:"shirt-brothers"},
  {name:"Randall is Interesting",s:3,e:5,slug:"randall-is-interesting"},
  {name:"Photo Booth",s:3,e:5,slug:"photo-booth"},
  {name:"Talking about my Kids",s:3,e:5,slug:"talking-about-my-kids"},
  {name:"Banana Breath",s:3,e:6,slug:"banana-breath"},
  {name:"Metal Motto Search",s:3,e:6,slug:"metal-motto-search"},
  {name:"King of the Dirty Songs",s:3,e:6,slug:"king-of-the-dirty-songs"},
  {name:"Tasty Time Vids",s:3,e:6,slug:"tasty-time-vids"},
];

let state = { phase:'start', selectedSeasons:[1,2,3], skits:[], scores:{}, comparisons:[], currentIdx:0, history:[] };

function initSkits() {
  state.skits = ALL_SKITS.filter(s => state.selectedSeasons.includes(s.s));
  state.scores = {};
  state.skits.forEach(s => { state.scores[s.slug] = 1200; });
  state.comparisons = [];
  for (let i = 0; i < state.skits.length; i++)
    for (let j = i + 1; j < state.skits.length; j++)
      state.comparisons.push([i, j]);
  shuffle(state.comparisons);
  state.comparisons = state.comparisons.slice(0, Math.min(state.comparisons.length, state.skits.length * 5));
  state.currentIdx = 0; state.history = []; state.phase = 'battle';
}

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
}

function eloUpdate(w, l) {
  const K = 32, rW = state.scores[w], rL = state.scores[l];
  const eW = 1 / (1 + Math.pow(10, (rL - rW) / 400));
  state.scores[w] = Math.round(rW + K * (1 - eW));
  state.scores[l] = Math.round(rL - K * (1 - eW));
}

function pick(side) {
  const [i, j] = state.comparisons[state.currentIdx];
  const wi = side === 0 ? i : j, li = side === 0 ? j : i;
  state.history.push({ idx: state.currentIdx, pairs: [i, j], winnerSlug: state.skits[wi].slug });
  eloUpdate(state.skits[wi].slug, state.skits[li].slug);
  state.currentIdx++;
  if (state.currentIdx >= state.comparisons.length) state.phase = 'results';
  render();
}

function undoPick() {
  if (!state.history.length) return;
  const last = state.history.pop();
  const [i, j] = last.pairs;
  const wi = last.winnerSlug === state.skits[i].slug ? i : j, li = wi === i ? j : i;
  const K = 32, rW = state.scores[state.skits[wi].slug], rL = state.scores[state.skits[li].slug];
  const eW = 1 / (1 + Math.pow(10, (rL - rW) / 400));
  state.scores[state.skits[wi].slug] = Math.round(rW - K * (1 - eW));
  state.scores[state.skits[li].slug] = Math.round(rL + K * (1 - eW));
  state.currentIdx = last.idx; state.phase = 'battle'; render();
}

function cardHtml(skit, side) {
  const url = imgUrl(skit.slug);
  const imgPart = url
    ? `<img class="skit-img" src="${url}" alt="${skit.name}" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='flex'"><div class="skit-img-placeholder" style="display:none">🎬</div>`
    : `<div class="skit-img-placeholder">🎬</div>`;
  return `<div class="skit-card" onclick="pick(${side})">${imgPart}<div class="skit-info"><div class="skit-name">${skit.name}</div><div class="skit-meta">Season ${skit.s} · Episode ${skit.e}</div></div></div>`;
}

function buildShareText(ranked) {
  const top5 = ranked.slice(0, 5).map((s, i) => ['🥇','🥈','🥉','4.','5.'][i] + ' ' + s.name).join('\n');
  return `my ITYSL skit rankings (via HOOHHHH productions)\n\n${top5}\n\nrank yours → https://kaitlynm2010-ctrl.github.io/itsyl-sorter/`;
}

function copyResults() {
  const ranked = [...state.skits].sort((a, b) => state.scores[b.slug] - state.scores[a.slug]);
  navigator.clipboard.writeText(buildShareText(ranked)).then(() => {
    const msg = document.getElementById('copied-msg');
    if (msg) { msg.textContent = '✓ copied to clipboard!'; setTimeout(() => { msg.textContent = ''; }, 2500); }
  });
}

function render() {
  const main = document.getElementById('main');

  if (state.phase === 'start') {
    main.innerHTML = `
      <div class="start-screen">
        <p class="intro">Pick your favorite skit in each head-to-head battle.<br>We'll use those choices to build your personal all-time ranking.</p>
        <div class="season-filter">
          <button class="filter-btn ${state.selectedSeasons.includes(1)?'active':''}" onclick="toggleSeason(1)">Season 1</button>
          <button class="filter-btn ${state.selectedSeasons.includes(2)?'active':''}" onclick="toggleSeason(2)">Season 2</button>
          <button class="filter-btn ${state.selectedSeasons.includes(3)?'active':''}" onclick="toggleSeason(3)">Season 3</button>
        </div>
        <p class="skit-count">${ALL_SKITS.filter(s => state.selectedSeasons.includes(s.s)).length} skits selected</p>
        <button class="start-btn" onclick="startSort()" style="margin-top:20px">start sorting</button>
      </div>`;

  } else if (state.phase === 'battle') {
    const [i, j] = state.comparisons[state.currentIdx];
    const pct = Math.round((state.currentIdx / state.comparisons.length) * 100);
    main.innerHTML = `
      <div class="progress-wrap">
        <div class="progress-bar-track"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
        <div class="progress-label">battle ${state.currentIdx + 1} of ${state.comparisons.length} · ${pct}% sorted</div>
      </div>
      <p class="battle-question">which skit do you like better?</p>
      <div class="battle-area">
        ${cardHtml(state.skits[i], 0)}
        <div class="vs-badge">vs</div>
        ${cardHtml(state.skits[j], 1)}
      </div>
      <div class="btn-row">
        <button class="btn" onclick="skipPick()">skip / no opinion</button>
        ${state.history.length ? `<button class="btn" onclick="undoPick()">← undo</button>` : ''}
        <button class="btn" onclick="finishEarly()">see results now</button>
      </div>`;

  } else {
    const ranked = [...state.skits].sort((a, b) => state.scores[b.slug] - state.scores[a.slug]);
    const medals = ['🥇','🥈','🥉'];
    const items = ranked.map((s, idx) => `
      <li class="rank-item">
        ${idx < 3 ? `<span class="rank-medal">${medals[idx]}</span>` : `<span class="rank-num">${idx + 1}</span>`}
        <span class="rank-name">${s.name}</span>
        <span class="rank-meta">S${s.s}E${s.e}</span>
        <span class="rank-score">${state.scores[s.slug]}</span>
      </li>`).join('');
    main.innerHTML = `
      <div class="results-header">
        <h2>your personal ranking</h2>
        <p>${ranked.length} skits sorted · elo scores on the right</p>
      </div>
      <ul class="rank-list">${items}</ul>
      <div class="share-row">
        <button class="share-btn" onclick="copyResults()">📋 copy my top 5 to share</button>
        <div class="copied-msg" id="copied-msg"></div>
      </div>
      <button class="restart-btn" onclick="restart()">sort again</button>`;
  }
}

function toggleSeason(s) {
  if (state.selectedSeasons.includes(s)) {
    if (state.selectedSeasons.length > 1) state.selectedSeasons = state.selectedSeasons.filter(x => x !== s);
  } else { state.selectedSeasons.push(s); }
  render();
}
function startSort() { initSkits(); render(); }
function skipPick() { state.currentIdx++; if (state.currentIdx >= state.comparisons.length) state.phase = 'results'; render(); }
function finishEarly() { state.phase = 'results'; render(); }
function restart() { state.phase = 'start'; render(); }

render();
</script>
